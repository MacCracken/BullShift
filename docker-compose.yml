# BullShift Trading Platform - Docker Compose
#
# Usage:
#   cp .env.example .env   # fill in credentials
#   docker compose up -d

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bullshift-api
    ports:
      - "${BULLSHIFT_PORT:-8787}:8787"
    environment:
      - RUST_LOG=${RUST_LOG:-info}
      - BULLSHIFT_PORT=8787
      - ALPACA_API_KEY=${ALPACA_API_KEY}
      - ALPACA_API_SECRET=${ALPACA_API_SECRET}
      - ALPACA_SANDBOX=${ALPACA_SANDBOX:-true}
    volumes:
      - bullshift-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8787/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M

volumes:
  bullshift-data:
